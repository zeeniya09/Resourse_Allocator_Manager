global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "nodejs-app"
    static_configs:
      - targets: ["node-app:3000"]

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter1:9100"
          - "node-exporter2:9100"
          - "node-exporter3:9100"
